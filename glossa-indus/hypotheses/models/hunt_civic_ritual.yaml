# Comparison with Phase-43 structural findings
comparison_with_glossa_lab:
  positional_analysis: >
    Phase-43 T2.2 confirms 20 TERMINAL_STRONG signs and 40 INITIAL_STRONG signs
    exist in the V3 corpus. This is consistent with the prefix-medial-suffix hypothesis
    but does not confirm it — the same pattern is also predicted by the Dravidian suffix
    model. The two models make the same structural prediction; they differ in interpretation.
  key_question: >
    Can faunal/celestial/botanical/hydrological sign IDENTITY be confirmed from
    sign visual descriptions? This requires a visual crosswalk (Mahadevan catalog images)
    which is not yet fully digitized in this system.

