version: "1.0"
model_id: dravidian_phonotactic
description: >
  Dravidian phonotactic constraint model for Indus script comparison.
  Free variables: h1_normalized (entropy) and bigram_consistency (SA score).
  Derived variables: dravidian_score, indo_aryan_contrast.
  Constraints encode what a "Dravidian-like" corpus should look like:
  high bigram consistency with Tamil/Kannada/Telugu, entropy in the
  syllabic range (3.5-6.0 bits normalized), positive gap from Sanskrit baseline.
  Use with CASProjector to evaluate any corpus against Dravidian constraints.

state:
  variables:
    - name: h1_normalized
      type: float
      domain: [0.0, 1.0]
      description: "H1 entropy normalized to [0,1] (H1 / 6.0 bits; syllabaries ~0.65-0.95)"

    - name: bigram_consistency
      type: float
      domain: [0.0, 1.0]
      description: "SA consistency score against Dravidian LM (0.9753 for Indus vs Tamil)"

    - name: dravidian_score
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: "Combined Dravidian phonotactic score (80% bigram + 20% entropy)"

    - name: indo_aryan_contrast
      type: float
      domain: [-1.0, 1.0]
      derived: true
      description: "Score gap vs Sanskrit baseline (0.7347); positive = Dravidian wins"

    - name: classification
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: >
        Dravidian classification confidence: 1.0 = conclusive Dravidian,
        0.5 = ambiguous, 0.0 = not Dravidian.

degrees_of_freedom:
  free:
    - h1_normalized
    - bigram_consistency

constraints:
  - id: dravidian_score_def
    expression: "dravidian_score = bigram_consistency * 0.80 + h1_normalized * 0.20"
    description: >
      Dravidian phonotactic score: 80% weight on SA bigram consistency
      (directly measures phonotactic match) + 20% on normalized entropy
      (Dravidian syllabaries have H1 in 4.0-6.0 bit range).

  - id: indo_aryan_contrast_def
    expression: "indo_aryan_contrast = dravidian_score - 0.7347"
    description: >
      Gap from Sanskrit baseline (SA consistency = 0.7347).
      Indus vs Tamil gave dravidian_score ≈ 0.9753, indo_aryan_contrast ≈ 0.241.
      Positive and large = strong Dravidian signal.

  - id: classification_def
    expression: "classification = dravidian_score * 0.9 + indo_aryan_contrast * 0.1"
    description: >
      Classification confidence: combines absolute Dravidian score with
      the contrast margin over Indo-Aryan. Threshold: >= 0.85 = Dravidian.

  - id: dravidian_threshold
    expression: "dravidian_score >= 0.85"
    description: >
      Minimum Dravidian score for a positive classification.
      Indus script achieved 0.9753; threshold is conservative.

projection:
  method: gradient
  max_iterations: 150
  convergence_epsilon: 0.00001
  strategy: iterative

execution:
  deterministic: true
  numeric_mode: float64
  precision_bits: 64
