name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup (POSIX)
        if: runner.os != 'Windows'
        run: |
          chmod +x shell.sh
          ./shell.sh setup

      - name: Setup (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: shell.cmd setup

      - name: Test (POSIX)
        if: runner.os != 'Windows'
        run: ./shell.sh test backend/tests -v

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: shell.cmd test backend\tests -v

      - name: Lint (POSIX)
        if: runner.os != 'Windows'
        run: ./shell.sh lint backend/glossa_lab

      - name: Lint (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: shell.cmd lint backend\glossa_lab
