version: "1.2"
model_id: indo_aryan_morphology
description: >
  Indo-Aryan-family hypothesis (Vedic Sanskrit / Old Indo-Aryan) projected
  as a CPSC constraint manifold over the Phase-14 structural-signature
  DoFs. Indo-Aryan is fusional/inflectional with sandhi at morpheme
  boundaries.
  Phase-18 update: primary grounding is now the Hellwig 2018 morpho-lexical
  Rigveda padapatha (163,172 sandhi-resolved words across 20,192 verses),
  which is *running* Sanskrit -- the right shape for cross-script comparison.
  The Kalyanaraman bag-of-words measurement is retained as a secondary
  measured_from for transparency, but constraints are now anchored to RV
  padapatha and the Kalyanaraman-specific fingerprint stays in the
  separate vedic_kalyanaraman_morphology.yaml.
measured_from:
  - corpus: rv_padapatha
    n_tokens: 163172
    n_types: 27152
    zipf_alpha: 1.0179
    zipf_r2: 0.9347
    mi_gamma: 0.0178
    mi_r2_pow: 0.9128
    epistatic_2nd_norm: 0.6333
    epistatic_3rd_norm: 0.3116
    h1_norm: 0.8249
    h1_nats: 8.5940
    note: "Hellwig 2018 morpho-lexical Rigveda padapatha (sanskrit-texts/rigveda); running Sanskrit, primary anchor for Phase-18."
  - corpus: kalyanaraman_vedic
    n_tokens: 98707
    n_types: 49140
    zipf_alpha: 0.5849
    zipf_r2: 0.9022
    mi_gamma: 0.0097
    mi_r2_pow: 0.9718
    epistatic_2nd_norm: 0.9017
    epistatic_3rd_norm: 0.8191
    h1_norm: 0.9357
    h1_nats: 10.1075
    note: "Devanagari vocabulary from Kalyanaraman; bag-of-words artefact, kept for transparency only."
state:
  variables:
    - name: zipf_alpha
      type: float
      domain: [0.0, 3.0]
      description: "Zipf-Mandelbrot alpha. Sanskrit: 0.90-1.25."
    - name: zipf_r2
      type: float
      domain: [0.0, 1.0]
      description: "Zipf fit R^2. Sanskrit: >= 0.80."
    - name: mi_gamma
      type: float
      domain: [0.0, 5.0]
      description: "Power-law MI decay. Inflectional/sandhi: 0.30-0.85."
    - name: mi_r2_pow
      type: float
      domain: [0.0, 1.0]
      description: "MI power-law fit R^2. Sanskrit: >= 0.65."
    - name: epistatic_2nd_norm
      type: float
      domain: [0.0, 1.0]
      description: "2nd-order info fraction. Inflectional: 0.10-0.35."
    - name: epistatic_3rd_norm
      type: float
      domain: [0.0, 1.0]
      description: "3rd-order info fraction. Inflectional: 0.05-0.20."
    - name: h1_norm
      type: float
      domain: [0.0, 1.0]
      description: "Per-symbol H1 / ln(L). Syllabic: 0.60-0.85."
    - name: h1_nats
      type: float
      domain: [0.0, 12.0]
      description: "Raw H1 in nats (diagnostic only)."
    - name: indo_aryan_score
      type: float
      domain: [0.0, 2.0]
      derived: true
      description: "Aggregate Indo-Aryan-fit score. >=1.5 strong fit."
degrees_of_freedom:
  free:
    - zipf_alpha
    - zipf_r2
    - mi_gamma
    - mi_r2_pow
    - epistatic_2nd_norm
    - epistatic_3rd_norm
    - h1_norm
    - h1_nats
constraints:
  # Phase-18 grounded ranges, anchored to RV padapatha (running Sanskrit).
  # Tighter than Phase-16/v1.1 because we now have the right corpus shape.
  - id: zipf_alpha_ia_low
    expression: "zipf_alpha >= 0.85"
    description: "Measured 1.018 on RV padapatha; lower bound at 0.85."
  - id: zipf_alpha_ia_high
    expression: "zipf_alpha <= 1.20"
  - id: zipf_r2_ia
    expression: "zipf_r2 >= 0.85"
    description: "Measured 0.93 on RV padapatha."
  - id: mi_gamma_ia_low
    expression: "mi_gamma >= 0.005"
    description: "Measured 0.018 on RV padapatha; verse-segmented stream has weak long-range MI."
  - id: mi_gamma_ia_high
    expression: "mi_gamma <= 0.30"
  - id: mi_r2_pow_ia
    expression: "mi_r2_pow >= 0.70"
  - id: hed_2nd_ia_low
    expression: "epistatic_2nd_norm >= 0.50"
    description: "Measured 0.633 on RV padapatha."
  - id: hed_2nd_ia_high
    expression: "epistatic_2nd_norm <= 0.80"
  - id: hed_3rd_ia_low
    expression: "epistatic_3rd_norm >= 0.20"
    description: "Measured 0.312 on RV padapatha."
  - id: hed_3rd_ia_high
    expression: "epistatic_3rd_norm <= 0.55"
  - id: h1_norm_ia_low
    expression: "h1_norm >= 0.70"
    description: "Measured 0.825 on RV padapatha."
  - id: h1_norm_ia_high
    expression: "h1_norm <= 0.92"
  - id: indo_aryan_score_def
    expression: "indo_aryan_score = zipf_r2 * 0.25 + mi_r2_pow * 0.25 + epistatic_2nd_norm * 0.9 + epistatic_3rd_norm * 1.0 + h1_norm * 0.30"
    description: "Score weighted toward fusional / mid-range epistatic fingerprint."
projection:
  strategy: iterative
  max_iterations: 200
  convergence_epsilon: 0.000001
