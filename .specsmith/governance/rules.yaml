rules:
- id: H1
  name: Ledger required
  description: No ledger entry = work not done.
- id: H2
  name: Proposal required
  description: No proposal = no execution.
- id: H3
  name: Cross-platform awareness
  description: All work must consider every target platform (Windows, Linux, macOS).
    If a platform is unsupported or deferred, that must be stated explicitly.
- id: H4
  name: Environment isolation
  description: No system-dependent assumptions. Virtual environments required. No
    reliance on global interpreters or system packages.
- id: H5
  name: Explicit startup
  description: No hidden service logic. All startup behavior must be documented and
    inspectable.
- id: H6
  name: No silent scope expansion
  description: If the task grows beyond the proposal, stop and re-propose.
- id: H7
  name: No undocumented state changes
  description: Every file creation, modification, or deletion must be traceable to
    a proposal and recorded in the ledger.
- id: H8
  name: Documentation is implementation
  description: Architecture-affecting changes MUST update relevant docs in the same
    work cycle.
- id: H9
  name: Execution timeout required
  description: All agent-invoked commands MUST have a timeout. No command may run
    indefinitely. If a command hangs, it must be killed, recorded in the ledger, and
    escalated after one retry.
- id: H10
  name: No hardcoded versions
  description: Version strings MUST NOT be hardcoded in documentation, tests, or source
    code outside of `pyproject.toml`. Use `importlib.metadata.version()` at runtime.
    Use `{{ version }}` placeholders in documentation resolved at build time.
- id: H11
  name: No unbounded loops or blocking I/O without a deadline
  description: 'Every loop or blocking wait in agent-written scripts and automation
    MUST have:


    - An explicit deadline or iteration cap (e.g. a `deadline` timestamp, a `max_attempts`
    counter, or a `timeout` parameter).

    - A fallback exit path that executes when the deadline is reached.

    - A diagnostic message emitted if the timeout fires (self-diagnosing failures).


    Examples of violating patterns: `while True:` / `while ($true)` / `for (;;)` with
    no deadline guard; serial-port or I/O polling loops with no deadlin'
- id: H12
  name: Windows multi-step automation via .cmd files
  description: On Windows, multi-step or heavily-quoted automation sequences MUST
    be written to a temporary `.cmd` file and executed from there. Do NOT emit these
    as inline shell invocations or as `.ps1` files unless there is a concrete PowerShell-only
    requirement. Inline multi-line quoting on Windows is fragile and causes avoidable
    hangs.
- id: H13
  name: Epistemic Boundaries Required
  description: 'All proposals MUST state their epistemic boundaries. A proposal without
    explicit assumptions is a stop condition, not a warning. Before executing, ask:

    - What BeliefArtifact IDs does this proposal rely on?

    - What are the hidden assumptions?

    - What adversarial challenge could break this proposal?

    - Are any P1 requirements in scope and at LOW confidence?


    Hidden assumptions are not acceptable. Declare all epistemic boundaries in the
    `Assumptions:` field of every proposal.


    ---


    ## Stop Conditions

    '
- id: H14
  name: No direct email
  description: Agents MUST NOT send, compose, or trigger emails to any external party
    directly (e.g. via SMTP, API calls, or shell commands). All outbound email MUST
    be routed exclusively through the glossa-lab backend email system, and only to
    recipients configured in the project email report settings. This applies to scholar
    outreach, collaboration messages, and any other external communication. Violation
    is an immediate stop condition.
- id: H15
  name: Graph-first, no new hardcoded experiments
  description: >-
    All new research phase experiments MUST be expressed as AtomicNodeDef nodes in
    a dedicated experiment_graph_phaseNN_MM.py module. Agents MUST NOT define new
    ExperimentBase subclasses for phase research scripts, hardcode anchor dicts or
    phase logic directly in experiment_graph.py, or run a phase script before its
    graph module is created and registered (see H23). The only valid pattern is:
    phase script reads pre-computed JSON report; graph node loads that report or
    runs script via subprocess. Every phase must be navigable from the Experiment
    Builder palette. Violation is an immediate stop condition.
- id: H16
  name: No hardcoded user data in experiments
  description: >-
    Experiments MUST NOT hardcode corpus data, language model data, anchor sets, or
    report templates that should be user-configurable. All such data MUST be loaded
    from the database (via CorpusLM, AnchorSetLoader, ReportGenerator) or from
    registered JSON files. New experiments that bypass the database for user-owned
    data violate the H16 user-definable principle and must be refactored before merging.
- id: H20
  name: GPU enforcement in phase scripts
  description: >-
    All Indus Decipherment phase scripts that run SA or compute-intensive analysis
    MUST import torch and detect torch.cuda.is_available(), expose gpu_device in
    their JSON report output, use BigramScorer from glossa_lab.pipelines.decipher
    for SA (auto-selects CUDA), and print a WARNING (never silently fall back) if
    GPU is not available. Foundation Check NEW-G must pass. Silent CPU fallback
    is forbidden.
- id: H21
  name: Foundation check gate
  description: >-
    backend/scripts/foundation_check.py MUST be run and show 0 failures after any
    phase that modifies INDUS_FINAL_ANCHORS.json, promotes anchor confidence
    (LOW->MEDIUM or MEDIUM->HIGH), updates any dravidian_*.json language model, or
    adds new phase*.json result files to reports/. No commit touching anchor or
    phase data may be pushed with a failing foundation check.
- id: H23
  name: Mandatory 5-step experiment gate
  description: >-
    Before running ANY new phase script, the following 5 steps are MANDATORY in
    order: (1) Write the script (backend/scripts/phaseNN_name.py). (2) Create the
    graph module (backend/glossa_lab/experiment_graph_phaseNN_MM.py) with AtomicNodeDef
    nodes. (3) Register in experiment_graph.py via a try/except import block.
    (4) Verify registration: python -c "from glossa_lab.experiment_graph import
    ATOMIC_NODES; assert 'NodeID' in ATOMIC_NODES". (5) Run the script.
    Skipping steps 2-4 before step 5 is a cardinal H23 violation.
