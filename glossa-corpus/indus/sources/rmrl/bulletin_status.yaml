indusscript_firebase:
  status: authorized_export_required
  framework: "Flutter Web + Cloud Firestore (firebase_firestore.js)"
  project_id: "theindusscript"
  confirmed_NOT_realtime_db: true
  note: |
    The app uses Cloud Firestore, NOT Firebase Realtime Database.
    Anonymous auth succeeds but Firestore rules deny anonymous reads.
    Key field names found in bundle: textnum, posnum, inscobj, signnum, fsymbols
    Text numbering: 4-digit (IM77 style, e.g. 0001-9999)
    bundled_asset: assets/assets/im77intro.pdf (2.7MB, downloaded)
  next_actions:
    - Create account at indusscript.in (Google Sign-In)
    - Run probe_indusscript.py --phase C to capture Firestore network calls
    - Send formal export request to RMRL: rmrl@rmrl.in
  firestore_field_names:
    textnum: "Primary text number (4-digit IM77 numbering)"
    posnum: "Position number within text"
    inscobj: "Inscription object"
    signnum: "Sign number"
    fsymbols: "Field symbols"
    tnum: "Text number (short form)"
    orderBy: "Firestore ordering — confirms structured queries"
