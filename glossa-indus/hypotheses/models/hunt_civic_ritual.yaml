core_thesis: >
  The Indus script functioned as a civic-ritual continuity system, NOT phonetic writing
  or royal titulature. Inscriptions encode ecological cycles, distributed governance,
  and civic identity. The system uses a tripartite inscription grammar:
    prefix (identity/office/commodity) + medial (action/transaction/domain)
    + suffix (cycle/jurisdiction/logistics)
  Notably ABSENT: titulature, conquest narratives, palace propaganda.
  The framework is consistent with archaeological evidence of urban planning without kingship.

methods:
  - glyph normalization and clustering
  - positional syntax modeling (prefix/medial/suffix)
  - contextual integration (hydrology, residues, archaeoastronomy)
  - ethology-inspired coherence tests
  - Translation Atlas with canonical forms, frequencies, co-occurrence sets

testable_predictions:
  - lipid residues in vessel inscriptions
  - isotopic assays for trade goods
  - archaeoastronomy alignments with celestial suffix signs

known_claims_summary: >
  Indus script is a civic-ritual continuity system encoding ecological cycles,
  distributed governance, and civic identity. Proposes tripartite grammar:
  prefix (identity/commodity/office) + medial (action/transaction/domain)
  + suffix (cycle/jurisdiction/logistics). 24-cluster Translation Atlas.
  Faunal signs = identity/guild/commodity prefixes. Botanical signs = agricultural/
  ritual medials. Celestial signs = suffix/cycle markers. Hydrological signs
  correlate with waterworks/docks/canals. Governance signs at gates/citadels.

core_claims:
  - claim_id: hunt_syntax_001
    normalized_claim: "Indus inscriptions follow prefix-medial-suffix grammar."
    claim_type: sign_position_claim
    claim_status: untested
    testability: directly_testable
    falsification_condition: >
      If faunal signs are NOT statistically initial and celestial signs are NOT
      statistically terminal across the corpus, the tripartite syntax claim fails.

  - claim_id: hunt_faunal_001
    normalized_claim: "Faunal signs often function as identity/guild/commodity prefixes."
    claim_type: sign_function_claim
    claim_status: untested
    testability: directly_testable
    falsification_condition: >
      If faunal signs are not enriched in initial position above random baseline.

  - claim_id: hunt_celestial_001
    normalized_claim: "Celestial signs often function as suffix/cycle markers."
    claim_type: sign_function_claim
    claim_status: untested
    testability: directly_testable
    falsification_condition: >
      If celestial signs are not enriched in terminal position above random baseline.

  - claim_id: hunt_hydro_001
    normalized_claim: >
      Hydrological signs correlate with waterworks, docks, canals, and tidal contexts.
    claim_type: archaeological_context_claim
    claim_status: untested
    testability: indirectly_testable
    required_data: "Site metadata with waterworks/dock classification"
    falsification_condition: >
      Hydrological signs do not cluster at water-related sites above random.

  - claim_id: hunt_civic_001
    normalized_claim: >
      Governance signs correlate with gates, citadels, civic offices, and control points.
    claim_type: archaeological_context_claim
    claim_status: untested
    testability: indirectly_testable
    required_data: "Site metadata with gate/citadel/control classification"

