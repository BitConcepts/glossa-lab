# Hypothesis Model: Roif Economic/Guild Ledger
# Glossa-Lab Indus Evidence Graph
# STATUS: PARTIALLY ENCODED — paper processed 2026-05-17

model_id: roif_guild_ledger
model_name: "Roif — Akkadian Trade Mnemonic / Guild Ledger Model"
model_type: phonetic_mnemonic_economic_ledger
status: partially_encoded

source_document:
  document_id: indus_valley_script_deci.pdf"
  title: "Indus Valley Script deciphered — From Mythology to History using the Akkadian shorthand approach"
  author: "Roif, Avishai"
  doi: "10.2307/595168"

core_thesis: >
  The Indus Valley Script functioned primarily as a living economic ledger
  encoding tribute, trade, guild interactions, and enforcement arrangements.
  Methodology pairs Akkadian trade mnemonics with Proto-Dravidian phonetics.
  Proposed by Avishai Roif as a socioeconomic ledger, not ritual codex.

# Sign assignments extracted from paper
sign_assignments:
  - sign_visual: "fish" ; site_context: "Coastal (Lothal); trade guilds"
  - sign_visual: "jar/pot"; proposed_value: "storage/tribute"
  - sign_visual: "horned deity"; site_context: "Kalibangan fire-altars; tribute intermediaries"
  - sign_visual: "arrow"; proposed_value: "tir = enforcement/conflict resolution"; site_context: "border/riverine sites"
  - sign_visual: "boat"; proposed_value: "maritime trade"
  - sign_visual: "cattle/bull"; proposed_value: "livestock tribute"
  - sign_visual: "plough"; proposed_value: "agricultural production"
  - sign_visual: "serpent"; proposed_value: "boundary/ritual marker"
  - sign_visual: "grid/checker"; proposed_value: "accounting/ledger structure"

glossa_lab_prior_result_fish: >
  Phase-4x CISI: fish NOT coastal-enriched (coastal rate 5.7% below baseline).
  Fish signs appear at inland sites (Harappa, Mohenjo-daro) above chance.
  This PARTIALLY FALSIFIES Roif's coastal-controller claim for fish.

known_claims_summary: >
  Indus script encodes guild, tribute, trade, and enforcement relations using
  Proto-Dravidian phonetics and Akkadian trade-mnemonic parallels.
  Sign table maps: fish (coastal guild), jar (tribute), horned deity (intermediary),
  arrow (enforcement), boat (maritime trade), cattle, plough, serpent, grid.

core_claims:
  - claim_id: roif_economic_001
    normalized_claim: >
      Indus script primarily records guild, tribute, trade, and enforcement relations.
    claim_type: decipherment_model_claim
    claim_status: untested
    testability: indirectly_testable
    falsification_condition: >
      Proposed economic signs do not correlate with expected trade/storage contexts
      at higher-than-chance rates.

  - claim_id: roif_fish_001
    normalized_claim: "Fish sign relates to mīn / value marker / controller."
    claim_type: sign_value_claim
    signs_involved: ["fish family"]
    claim_status: untested
    testability: directly_testable
    falsification_condition: >
      If fish signs do not cluster at trade/merchant contexts more than random,
      or if phonetic assignment is inconsistent with bigram patterns.

  - claim_id: roif_jar_001
    normalized_claim: "Jar sign relates to storage or tribute."
    claim_type: sign_value_claim
    claim_status: untested

  - claim_id: roif_arrow_001
    normalized_claim: "Arrow sign relates to transaction completion or enforcement."
    claim_type: sign_value_claim
    claim_status: untested

# Tests to run once paper is uploaded and encoded
tests_planned:
  - id: roif_test_001
    description: "Do proposed economic signs cluster in trade/storage contexts?"
    required_data:
      - sign sequences
      - site type metadata (trade/storage/craft)
    status: pending_data

  - id: roif_test_002
    description: "Are enforcement signs enriched at gates/boundaries/frontier sites?"
    required_data:
      - site type metadata (gateway/border)
    status: pending_data

  - id: roif_test_003
    description: "Do fish/jar/boat signs cluster at port or water-related sites?"
    required_data:
      - site hydrological metadata
    status: pending_data

  - id: roif_test_004
    description: "Do proposed sequences recur above chance null model?"
    status: pending_encoding

  - id: roif_test_005
    description: "Are phonetic assignments consistent across sequences?"
    status: pending_encoding

