version: "1.1"
model_id: sumerian_morphology
description: >
  Sumerian-family hypothesis (language isolate, agglutinative SOV with
  rich verbal prefix and suffix system) projected as a CPSC constraint
  manifold over the Phase-14 structural-signature DoFs. Sumerian is
  written logo-syllabically with a large sign inventory (~600 signs in
  Ur III) producing broad Zipf alpha and weak MI decay (sign-level
  morphological coupling washed out by logograms).
  Phase-16 update: constraint ranges grounded against measured DoFs of
  the Ur III (3.47M signs) and Old Babylonian Sumerian-literary (425k
  signs) CDLI subsets. Notable empirical correction: mi_gamma turned
  out far LOWER than the Phase-15 heuristic guess of 0.15-0.80 because
  CDLI is dominated by short formulaic admin texts; new lower bound 0.01.
measured_from:
  - corpus: cdli_sumerian_ur3
    n_tokens: 3468699
    n_types: 109948
    zipf_alpha: 1.0978
    zipf_r2: 0.9197
    mi_gamma: 0.1413
    mi_r2_pow: 0.9258
    epistatic_2nd_norm: 0.5102
    epistatic_3rd_norm: 0.2557
    h1_norm: 0.5671
    h1_nats: 6.5830
    note: "CDLI Ur III Sumerian, Phase-16 measurement."
  - corpus: cdli_sumerian_ob_lit
    n_tokens: 425147
    n_types: 90024
    zipf_alpha: 0.8211
    zipf_r2: 0.9229
    mi_gamma: 0.0262
    mi_r2_pow: 0.9116
    epistatic_2nd_norm: 0.7261
    epistatic_3rd_norm: 0.5095
    h1_norm: 0.7830
    h1_nats: 8.9325
    note: "CDLI Old Babylonian Sumerian (literary admixture), Phase-16 measurement."
state:
  variables:
    - name: zipf_alpha
      type: float
      domain: [0.0, 3.0]
      description: "Zipf-Mandelbrot alpha. Sumerian Ur III: 0.80-1.10."
    - name: zipf_r2
      type: float
      domain: [0.0, 1.0]
      description: "Zipf fit R^2. Sumerian: >= 0.75."
    - name: mi_gamma
      type: float
      domain: [0.0, 5.0]
      description: "Power-law MI decay. Logo-syllabic: 0.20-0.70."
    - name: mi_r2_pow
      type: float
      domain: [0.0, 1.0]
      description: "MI power-law fit R^2. Sumerian: >= 0.50."
    - name: epistatic_2nd_norm
      type: float
      domain: [0.0, 1.0]
      description: "2nd-order info fraction. Logo-syllabic: 0.05-0.25."
    - name: epistatic_3rd_norm
      type: float
      domain: [0.0, 1.0]
      description: "3rd-order info fraction. Logo-syllabic: 0.03-0.15."
    - name: h1_norm
      type: float
      domain: [0.0, 1.0]
      description: "Per-symbol H1 / ln(L). Large inventory: 0.50-0.80."
    - name: h1_nats
      type: float
      domain: [0.0, 12.0]
      description: "Raw H1 in nats (diagnostic only)."
    - name: sumerian_score
      type: float
      domain: [0.0, 2.0]
      derived: true
      description: "Aggregate Sumerian-fit score. >=1.5 strong fit."
degrees_of_freedom:
  free:
    - zipf_alpha
    - zipf_r2
    - mi_gamma
    - mi_r2_pow
    - epistatic_2nd_norm
    - epistatic_3rd_norm
    - h1_norm
    - h1_nats
constraints:
  # Phase-16 grounded ranges. Measurements span [0.82, 1.10] for zipf_alpha and
  # [0.57, 0.78] for h1_norm, so we use [low - buffer, high + buffer].
  - id: zipf_alpha_su_low
    expression: "zipf_alpha >= 0.78"
  - id: zipf_alpha_su_high
    expression: "zipf_alpha <= 1.20"
  - id: zipf_r2_su
    expression: "zipf_r2 >= 0.85"
    description: "Measured 0.92 on both subsets; tightened from prior 0.70."
  - id: mi_gamma_su_low
    expression: "mi_gamma >= 0.01"
    description: "Measured 0.14 (Ur III) and 0.026 (OB lit). Phase-15 guess of 0.15 was wrong."
  - id: mi_gamma_su_high
    expression: "mi_gamma <= 0.40"
    description: "CDLI cuneiform never decays this fast in our Phase-16 sample."
  - id: mi_r2_pow_su
    expression: "mi_r2_pow >= 0.85"
    description: "Measured 0.91-0.93; power-law fit is actually very strong."
  - id: hed_2nd_su_low
    expression: "epistatic_2nd_norm >= 0.40"
    description: "Measured 0.51 (Ur III) and 0.73 (OB lit); much higher than Phase-15 guess of 0.04."
  - id: hed_2nd_su_high
    expression: "epistatic_2nd_norm <= 0.85"
  - id: hed_3rd_su_low
    expression: "epistatic_3rd_norm >= 0.18"
    description: "Measured 0.26 (Ur III) and 0.51 (OB lit)."
  - id: hed_3rd_su_high
    expression: "epistatic_3rd_norm <= 0.65"
  - id: h1_norm_su_low
    expression: "h1_norm >= 0.50"
    description: "Measured 0.567 (Ur III, large admin) and 0.783 (OB lit)."
  - id: h1_norm_su_high
    expression: "h1_norm <= 0.85"
  - id: sumerian_score_def
    expression: "sumerian_score = zipf_r2 * 0.30 + mi_r2_pow * 0.30 + epistatic_2nd_norm * 0.7 + epistatic_3rd_norm * 0.7 + h1_norm * 0.40"
    description: "Score weighted toward fit-quality DoFs (logo-syllabic noise)."
projection:
  strategy: iterative
  max_iterations: 200
  convergence_epsilon: 0.000001
