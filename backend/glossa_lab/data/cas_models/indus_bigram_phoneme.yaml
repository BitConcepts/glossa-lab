version: "1.0"
model_id: indus_bigram_phoneme
description: >
  Constraint model for the P122→P385 bigram phoneme assignment.
  P122 is the most frequent pure-MEDIAL sign (n=76, M=1.00) in CISI.
  P385 is the primary TERMINAL sign (n=35, T=0.83) following P122 in 83% of cases.
  This near-obligatory P122→P385 bigram (n=29/35) is consistent with a
  Dravidian STEM+CASE_SUFFIX morphological pattern.
  
  Free variables: phoneme ranks for P122 and P385 in the Dravidian alphabet.
  Constraints encode: P122 must rank highly as a medial consonant/vowel carrier;
  P385 must rank highly as a terminal genitive morpheme phoneme;
  the bigram compatibility score must be positive under Dravidian bigram statistics;
  the combined confidence score must exceed 0.70 for a positive phoneme assignment.

state:
  variables:
    - name: p122_rank
      type: float
      domain: [0.0, 1.0]
      description: "Normalized rank of P122's phoneme in Dravidian medial position frequency"

    - name: p385_rank
      type: float
      domain: [0.0, 1.0]
      description: "Normalized rank of P385's phoneme in Dravidian terminal position frequency"

    - name: bigram_compatibility
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: "P122→P385 bigram compatibility under Dravidian phonotactics"

    - name: morpheme_confidence
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: "Confidence that P385 is a case suffix morpheme following P122 as stem"

    - name: genitive_score
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: "Probability that P122→P385 = STEM + genitive suffix (-in/n)"

    - name: combined_confidence
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: "Combined phoneme assignment confidence score"

degrees_of_freedom:
  free:
    - p122_rank
    - p385_rank

constraints:
  - id: bigram_compat
    expression: "bigram_compatibility = p122_rank * 0.6 + p385_rank * 0.4"
    description: >
      Bigram compatibility: 60% weight on P122 (the medial stem phoneme)
      + 40% weight on P385 (the terminal suffix phoneme).
      High value = both phonemes are common in their respective positions.

  - id: morpheme_confidence_def
    expression: "morpheme_confidence = p385_rank * 0.75 + (1.0 - p122_rank) * 0.25"
    description: >
      Case suffix confidence: P385 must be a high-rank terminal phoneme (genitive -n/in);
      P122 should NOT itself be a high-rank terminal (it's medial, not a suffix).

  - id: genitive_score_def
    expression: "genitive_score = morpheme_confidence * 0.8 + bigram_compatibility * 0.2"
    description: >
      P122→P385 genitive reading score: 80% from morpheme confidence
      (the structural requirement that P385 acts as a case suffix on P122 stem)
      + 20% from raw bigram compatibility.

  - id: combined_def
    expression: "combined_confidence = genitive_score * 0.7 + bigram_compatibility * 0.3"
    description: "Overall phoneme assignment confidence"

  - id: min_confidence
    expression: "combined_confidence >= 0.70"
    description: >
      Minimum confidence threshold for accepting the phoneme assignment.
      Indus CISI has P122→P385 at 83% co-occurrence rate — a very strong
      structural signal that warrants this threshold.

  - id: terminal_bias
    expression: "p385_rank >= 0.60"
    description: >
      P385 must be a high-frequency terminal phoneme (genitive marker).
      In Tamil, genitive -in/-n is among the most frequent case suffixes,
      ensuring p385_rank >= 0.60 under any reasonable Dravidian model.

projection:
  method: bounded_relaxation
  max_iterations: 300
  convergence_epsilon: 0.00001
  strategy: iterative

execution:
  deterministic: true
  numeric_mode: float64
  precision_bits: 64
