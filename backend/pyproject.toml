[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glossa-lab"
version = "0.1.0"
description = "Backend service for Glossa Lab — agentic research lab for language and script analysis"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.34,<1",
    "python-json-logger>=3,<4",
    "aiosqlite>=0.20,<1",
    "reportlab>=4,<5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "httpx>=0.28,<1",
    "ruff>=0.9,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["glossa_lab"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
