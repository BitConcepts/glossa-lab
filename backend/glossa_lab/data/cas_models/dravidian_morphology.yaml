version: "1.1"
model_id: dravidian_morphology
description: >
  Dravidian-family hypothesis (Tamil/Kannada/Telugu/Brahui) projected as a
  CPSC constraint manifold over the Phase-14 structural-signature DoFs.
  Dravidian is strongly agglutinative SOV with a syllabic native script
  (Tamil-Brahmi ~50 signs, Kannada/Telugu ~50 signs). Case-bearing
  suffixes carry rich morphology, producing long-range MI correlations
  and elevated 2nd/3rd-order epistasis. Use with CASHypothesisProjector
  to score whether the M77 corpus's measured DoFs lie inside the
  Dravidian language manifold.
  Phase-16 update: constraint ranges grounded against measured DoFs of
  the Kee2u Tamil morpheme-ID stream (17,414 morphemes from 600 modern
  Tamil sentences). Single-corpus measurement; ranges widened by a
  buffer to accommodate corpus variation.
measured_from:
  - corpus: kee2u_tamil
    n_tokens: 17414
    n_types: 1924
    zipf_alpha: 1.1749
    zipf_r2: 0.9736
    mi_gamma: 0.0917
    mi_r2_pow: 0.7496
    epistatic_2nd_norm: 0.5691
    epistatic_3rd_norm: 0.2815
    h1_norm: 0.7752
    h1_nats: 5.8624
    note: "Kee2u Tamil morpheme-ID stream; Phase-16 measurement, Apr 2026."
state:
  variables:
    - name: zipf_alpha
      type: float
      domain: [0.0, 3.0]
      description: "Zipf-Mandelbrot alpha. Dravidian syllabaries: 0.95-1.15."
    - name: zipf_r2
      type: float
      domain: [0.0, 1.0]
      description: "Zipf fit R^2. Dravidian: >= 0.85."
    - name: mi_gamma
      type: float
      domain: [0.0, 5.0]
      description: "Power-law MI decay. Agglutinative: 0.40-1.00."
    - name: mi_r2_pow
      type: float
      domain: [0.0, 1.0]
      description: "MI power-law fit R^2. Dravidian: >= 0.70."
    - name: epistatic_2nd_norm
      type: float
      domain: [0.0, 1.0]
      description: "2nd-order info fraction. Rich morphology: 0.15-0.40."
    - name: epistatic_3rd_norm
      type: float
      domain: [0.0, 1.0]
      description: "3rd-order info fraction. Rich morphology: 0.10-0.25."
    - name: h1_norm
      type: float
      domain: [0.0, 1.0]
      description: "Per-symbol H1 / ln(L). Syllabic: 0.65-0.90."
    - name: h1_nats
      type: float
      domain: [0.0, 12.0]
      description: "Raw H1 in nats (diagnostic only)."
    - name: dravidian_score
      type: float
      domain: [0.0, 2.0]
      derived: true
      description: "Aggregate Dravidian-fit score. >=1.5 strong fit."
degrees_of_freedom:
  free:
    - zipf_alpha
    - zipf_r2
    - mi_gamma
    - mi_r2_pow
    - epistatic_2nd_norm
    - epistatic_3rd_norm
    - h1_norm
    - h1_nats
constraints:
  # Phase-16 grounded ranges: measured midpoint +/- buffer. Buffer is widened
  # because we have only one Tamil-corpus measurement and want to admit other
  # Dravidian languages whose DoFs we expect to differ moderately.
  - id: zipf_alpha_dravidian_low
    expression: "zipf_alpha >= 1.00"
    description: "Measured Tamil 1.175; lower bound widened to admit Telugu/Kannada."
  - id: zipf_alpha_dravidian_high
    expression: "zipf_alpha <= 1.30"
  - id: zipf_r2_dravidian
    expression: "zipf_r2 >= 0.85"
    description: "Measured 0.974; lower bound widened by ~0.12."
  - id: mi_gamma_dravidian_low
    expression: "mi_gamma >= 0.05"
    description: "Measured 0.092 on morpheme-ID stream; floor at 0.05."
  - id: mi_gamma_dravidian_high
    expression: "mi_gamma <= 1.10"
    description: "Upper bound retained for full prose Tamil where decay is faster."
  - id: mi_r2_pow_dravidian
    expression: "mi_r2_pow >= 0.55"
    description: "Measured 0.750; lower bound at 0.55."
  - id: hed_2nd_dravidian_low
    expression: "epistatic_2nd_norm >= 0.40"
    description: "Measured 0.569 on morpheme stream; rich agglutination."
  - id: hed_2nd_dravidian_high
    expression: "epistatic_2nd_norm <= 0.75"
  - id: hed_3rd_dravidian_low
    expression: "epistatic_3rd_norm >= 0.18"
    description: "Measured 0.282; multi-suffix chains."
  - id: hed_3rd_dravidian_high
    expression: "epistatic_3rd_norm <= 0.55"
  - id: h1_norm_dravidian_low
    expression: "h1_norm >= 0.65"
    description: "Measured 0.775 on Tamil; allow some downward variation."
  - id: h1_norm_dravidian_high
    expression: "h1_norm <= 0.95"
  - id: dravidian_score_def
    expression: "dravidian_score = zipf_r2 * 0.20 + mi_r2_pow * 0.20 + epistatic_2nd_norm * 1.0 + epistatic_3rd_norm * 1.5 + h1_norm * 0.25"
    description: "Fit score weighted toward morphological-richness DoFs."
projection:
  strategy: iterative
  max_iterations: 200
  convergence_epsilon: 0.000001
