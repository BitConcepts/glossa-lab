name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup (POSIX)
        if: runner.os != 'Windows'
        run: |
          chmod +x shell.sh
          ./shell.sh setup

      - name: Setup (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: shell.cmd setup

      - name: Test (POSIX)
        if: runner.os != 'Windows'
        run: ./shell.sh test backend/tests -v

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: shell.cmd test backend\tests -v

      - name: Lint (POSIX)
        if: runner.os != 'Windows'
        run: ./shell.sh lint backend/glossa_lab

      - name: Lint (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: shell.cmd lint backend\glossa_lab

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: |
          chmod +x shell.sh
          ./shell.sh setup

      - name: Start backend (background)
        run: |
          mkdir -p logs
          nohup ./shell.sh run >> logs/backend-ci.log 2>&1 &
          # Wait up to 30s for backend to respond
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health > /dev/null && echo "Backend ready (${i}s)" && break
            sleep 1
          done
          curl -sf http://localhost:8000/api/v1/health || (echo 'Backend failed to start'; cat logs/backend-ci.log; exit 1)

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          BACKEND_RUNNING: "1"
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
