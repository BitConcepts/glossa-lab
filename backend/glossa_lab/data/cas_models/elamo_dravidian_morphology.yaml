version: "1.0"
model_id: elamo_dravidian_morphology
description: >
  Elamo-Dravidian-family hypothesis (McAlpin's proposed superfamily of
  Elamite + Dravidian) projected as a CPSC constraint manifold over the
  Phase-14 structural-signature DoFs. Combines features of agglutinative
  Dravidian and Elamite (~130 syllabograms in Linear Elamite, with
  prefix and suffix morphology). Compared to pure Dravidian: broader
  bounds on Zipf alpha and MI gamma to accommodate Elamite admixture,
  intermediate epistatic fractions (Elamite has somewhat less depth in
  suffix chains than Tamil). Use with CASHypothesisProjector to score
  whether the M77 DoFs lie inside this hybrid language manifold.
state:
  variables:
    - name: zipf_alpha
      type: float
      domain: [0.0, 3.0]
      description: "Zipf-Mandelbrot alpha. Elamo-Dravidian: 0.85-1.20."
    - name: zipf_r2
      type: float
      domain: [0.0, 1.0]
      description: "Zipf fit R^2. >= 0.75."
    - name: mi_gamma
      type: float
      domain: [0.0, 5.0]
      description: "Power-law MI decay. Hybrid agglutinative: 0.30-0.95."
    - name: mi_r2_pow
      type: float
      domain: [0.0, 1.0]
      description: "MI power-law fit R^2. >= 0.55."
    - name: epistatic_2nd_norm
      type: float
      domain: [0.0, 1.0]
      description: "2nd-order info fraction. Hybrid: 0.10-0.40."
    - name: epistatic_3rd_norm
      type: float
      domain: [0.0, 1.0]
      description: "3rd-order info fraction. Hybrid: 0.05-0.22."
    - name: h1_norm
      type: float
      domain: [0.0, 1.0]
      description: "Per-symbol H1 / ln(L). Mid-syllabic: 0.55-0.90."
    - name: h1_nats
      type: float
      domain: [0.0, 12.0]
      description: "Raw H1 in nats (diagnostic only)."
    - name: elamo_dravidian_score
      type: float
      domain: [0.0, 2.0]
      derived: true
      description: "Aggregate Elamo-Dravidian-fit score. >=1.5 strong fit."
degrees_of_freedom:
  free:
    - zipf_alpha
    - zipf_r2
    - mi_gamma
    - mi_r2_pow
    - epistatic_2nd_norm
    - epistatic_3rd_norm
    - h1_norm
    - h1_nats
constraints:
  - id: zipf_alpha_ed_low
    expression: "zipf_alpha >= 0.85"
  - id: zipf_alpha_ed_high
    expression: "zipf_alpha <= 1.20"
  - id: zipf_r2_ed
    expression: "zipf_r2 >= 0.75"
  - id: mi_gamma_ed_low
    expression: "mi_gamma >= 0.30"
    description: "Hybrid agglutination still produces moderate MI decay."
  - id: mi_gamma_ed_high
    expression: "mi_gamma <= 1.05"
  - id: mi_r2_pow_ed
    expression: "mi_r2_pow >= 0.55"
  - id: hed_2nd_ed_low
    expression: "epistatic_2nd_norm >= 0.08"
  - id: hed_2nd_ed_high
    expression: "epistatic_2nd_norm <= 0.45"
  - id: hed_3rd_ed_low
    expression: "epistatic_3rd_norm >= 0.04"
  - id: h1_norm_ed_low
    expression: "h1_norm >= 0.50"
  - id: h1_norm_ed_high
    expression: "h1_norm <= 0.95"
  - id: elamo_dravidian_score_def
    expression: "elamo_dravidian_score = zipf_r2 * 0.22 + mi_r2_pow * 0.22 + epistatic_2nd_norm * 0.95 + epistatic_3rd_norm * 1.2 + h1_norm * 0.30"
    description: "Score weighted between Dravidian and Sumerian profiles."
projection:
  strategy: iterative
  max_iterations: 200
  convergence_epsilon: 0.000001
