schema_version: '1.0'
sweep:
  description: 'Automated sweep for academic papers on Indus script decipherment,
    Harappan civilization, computational sign analysis, and related archaeological
    studies. Targets 40–60 papers across multiple theoretical frameworks to enable
    cross-hypothesis comparison.

    '
  exclusions:
  - stock market
  - Indus Towers
  - Indus Hospital
  - Indus Motors
  - Indus River water treaty
  - Indus basin irrigation
  - Indus Waters Treaty
  - crypto
  - blockchain
  filters:
    languages:
    - en
    min_year: 1970
    require_abstract: false
    require_open_access: false
  keywords:
    expansions:
    - CISI Parpola
    - M77 Mahadevan concordance
    - Indus Valley computational linguistics
    - Harappan archaeology script
    - Meluhha Mesopotamia
    - Lothal seal inscription
    - Dholavira sign
    - Indus bigram
    - Indus sign function
    - Indus script rebus
    - Indus sign list
    primary:
    - Indus script
    - Harappan script
    - Indus Valley script
    - Indus decipherment
    - CISI corpus
    - Indus seal inscription
    secondary:
    - Mahadevan Indus
    - Parpola Indus
    - Rao Indus
    - Yadav Indus script
    - Wells Indus
    - Indus positional analysis
    - Indus script entropy
    - Mohenjo-daro inscription
    - Harappa seal
    - Proto-Dravidian Indus
    - Indus trade signs
    - Farmer Sproat Witzel Indus
    - Indus civic ritual
    - Indus non-linguistic
  name: Indus Script Research Sweep
  output:
    auto_intake: false
    candidate_format: json
    intake_dir: raw/sweep_candidates
    max_candidates: 200
  sources:
    academia_rss:
      enabled: true
      max_results: 20
    arxiv:
      categories:
      - cs.CL
      - stat.AP
      - cs.LG
      enabled: true
      max_results: 30
    brave:
      enabled: false
      max_results: 20
    crossref:
      enabled: true
      max_results: 50
    doaj:
      enabled: true
      max_results: 25
    europepmc:
      enabled: true
      max_results: 25
    gdelt:
      enabled: false
      max_results: 10
    newsapi:
      enabled: false
      max_results: 20
    openalex:
      enabled: true
      max_results: 50
    pubmed:
      enabled: false
      max_results: 20
    semanticscholar:
      enabled: true
      max_results: 50
