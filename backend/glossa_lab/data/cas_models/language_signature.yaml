version: "1.0"
model_id: language_signature
description: >
  CPSC constraint manifold for "valid natural-language writing system" — the
  Sproat-2014 / Rao-2009 / Lin-Tegmark-2017 typology invariants expressed as
  CAS-YAML so a corpus's measured DoF vector can be projected through CPSC's
  IterativeEngine and produce a deterministic max_violation per constraint.
  Free variables are the structural-signature DoFs the Phase-14 profilers
  produce; derived variables compose them into a single language-likeness
  score.

state:
  variables:
    - name: zipf_alpha
      type: float
      domain: [0.0, 3.0]
      description: "Zipf-Mandelbrot alpha exponent. Natural language: ~1.0-1.2."

    - name: zipf_r2
      type: float
      domain: [0.0, 1.0]
      description: "R^2 of the Zipf-Mandelbrot fit. Natural language: >= 0.85."

    - name: mi_gamma
      type: float
      domain: [0.0, 5.0]
      description: "Power-law decay exponent of I(X_t; X_{t+k}). Language: 0.3-1.0."

    - name: mi_r2_pow
      type: float
      domain: [0.0, 1.0]
      description: "R^2 of the power-law MI decay fit. Language: >= 0.7."

    - name: epistatic_2nd_norm
      type: float
      domain: [0.0, 1.0]
      description: "Fraction of corpus information at 2nd order (HED). Language: 0.10-0.40."

    - name: epistatic_3rd_norm
      type: float
      domain: [0.0, 1.0]
      description: "Fraction of corpus information at 3rd order (HED). Language: 0.05-0.30."

    - name: h1_norm
      type: float
      domain: [0.0, 1.0]
      description: "Per-symbol H1 normalised by ln(L). Language: 0.6-0.95."

    - name: h1_nats
      type: float
      domain: [0.0, 12.0]
      description: "Raw H1 in nats. (Diagnostic only; not directly constrained.)"

    # Derived
    - name: zipf_quality
      type: float
      domain: [0.0, 2.0]
      derived: true
      description: "Zipf alpha-fit quality combining alpha-in-range and R^2."

    - name: mi_quality
      type: float
      domain: [0.0, 2.0]
      derived: true
      description: "MI decay quality (gamma + R^2 weighted)."

    - name: epistatic_quality
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: "HED 2nd + 3rd order combined fraction."

    - name: language_score
      type: float
      domain: [0.0, 1.0]
      derived: true
      description: >
        Aggregate language-likeness score (0 = non-linguistic, 1 = strong
        natural-language signature). Combines zipf_quality, mi_quality,
        epistatic_quality, and h1_norm into one number.

degrees_of_freedom:
  free:
    - zipf_alpha
    - zipf_r2
    - mi_gamma
    - mi_r2_pow
    - epistatic_2nd_norm
    - epistatic_3rd_norm
    - h1_norm
    - h1_nats

constraints:
  - id: zipf_alpha_in_language_range
    expression: "zipf_alpha >= 0.85"
    description: >
      Zipf alpha must be at least 0.85 for a natural-language regime.
      Random / uniform corpora have alpha < 0.5.

  - id: zipf_alpha_upper_bound
    expression: "zipf_alpha <= 1.40"
    description: >
      Zipf alpha must be at most 1.40. Stronger decay (alpha > 1.5) is
      typical of formal codes / programming languages, not natural language.

  - id: zipf_fit_quality
    expression: "zipf_r2 >= 0.70"
    description: >
      The Zipf fit must explain at least 70 percent of the rank-frequency
      variance. Lower R^2 indicates a non-power-law regime.

  - id: mi_decay_must_exist
    expression: "mi_gamma >= 0.10"
    description: >
      Some power-law mutual-information decay must be present. gamma ~ 0
      is the unigram-random fingerprint.

  - id: mi_decay_upper_bound
    expression: "mi_gamma <= 1.50"
    description: >
      Decay slower than gamma > 1.5 is the Markov-1 fingerprint, not
      natural language.

  - id: mi_fit_quality
    expression: "mi_r2_pow >= 0.50"
    description: >
      Power-law MI fit must explain at least 50 percent of the variance.

  - id: hed_2nd_order_min
    expression: "epistatic_2nd_norm >= 0.05"
    description: >
      At least 5 percent of corpus information must be at 2nd order
      (mutual information beyond unigram). Below this the corpus is
      effectively a unigram process.

  - id: hed_3rd_order_min
    expression: "epistatic_3rd_norm >= 0.02"
    description: >
      At least 2 percent of corpus information must be at 3rd order.
      Linguistic compositionality always carries some 3rd+ order.

  - id: h1_norm_in_language_range
    expression: "h1_norm >= 0.50"
    description: >
      Normalised entropy must be at least 0.5 of ln(L). Below this the
      corpus is highly skewed toward a few signs (rote-formula).

  - id: h1_norm_upper_bound
    expression: "h1_norm <= 0.98"
    description: >
      Normalised entropy must be at most 0.98 of ln(L). Above this the
      corpus is approaching uniform random.

  - id: zipf_quality_def
    expression: "zipf_quality = zipf_r2 + (1.0 - abs(zipf_alpha - 1.05) / 0.5)"
    description: >
      Quality score: high when R^2 is high AND alpha is near 1.05.

  - id: mi_quality_def
    expression: "mi_quality = mi_r2_pow + (mi_gamma / 1.5)"
    description: "Quality score combining MI decay R^2 and gamma magnitude."

  - id: epistatic_quality_def
    expression: "epistatic_quality = epistatic_2nd_norm + epistatic_3rd_norm"
    description: "Sum of 2nd+3rd-order information fractions."

  - id: language_score_def
    expression: >
      language_score = zipf_quality * 0.30 + mi_quality * 0.30 +
                       epistatic_quality * 0.25 + h1_norm * 0.15
    description: >
      Aggregate language-likeness in [0,1]. >= 0.7 is a strong signature;
      <= 0.3 is non-linguistic.

projection:
  strategy: iterative
  max_iterations: 200
  convergence_epsilon: 1e-6
